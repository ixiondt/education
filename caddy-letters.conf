# ============================================================
#  Caddy configuration snippet for letters.guardcybersolutionsllc.com
#
#  Copy this block into /opt/apps/shared/caddy/Caddyfile on the
#  GuardCyber droplet, alongside the other tenant blocks.
#
#  Then: sudo systemctl reload caddy
#
#  This is a STATIC site — no container, no upstream proxy.
#  Caddy serves files directly from /opt/apps/letters-and-numbers/.
#  Same pattern as Dark Moon Security (see GuardCyber/README.md).
# ============================================================

letters.guardcybersolutionsllc.com {
    root * /opt/apps/letters-and-numbers
    file_server
    try_files {path} /index.html

    # Compression — Caddy supports gzip + zstd transparently
    encode gzip zstd

    # ---------------------------------------------------------
    # Headers
    # ---------------------------------------------------------
    header {
        # Strip identifying headers (consistent with other tenants)
        -Server
        -X-Powered-By
        -Via

        # Standard security headers (per ~/.claude/CLAUDE.md)
        Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload"
        X-Frame-Options              "DENY"
        X-Content-Type-Options       "nosniff"
        Referrer-Policy              "strict-origin-when-cross-origin"

        # Permissions — microphone is REQUIRED (in-app voice recording),
        # camera and geolocation are not used
        Permissions-Policy           "camera=(), microphone=(self), geolocation=()"

        # Content Security Policy
        # Style 'unsafe-inline' is required because index.html uses inline
        # style attributes (display:none toggles, etc). Could be tightened
        # later by refactoring inline styles into classes.
        # Google Fonts is allowed for the Andika typeface; can be removed
        # if/when the font is self-hosted.
        # blob: in media-src enables IndexedDB voice-recording playback.
        Content-Security-Policy      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; manifest-src 'self'; worker-src 'self'; media-src 'self' blob:; form-action 'self'; frame-ancestors 'none'; base-uri 'self'; upgrade-insecure-requests"
    }

    # ---------------------------------------------------------
    # MIME types — modern manifests
    # ---------------------------------------------------------
    @manifest path *.webmanifest
    header @manifest Content-Type "application/manifest+json; charset=utf-8"

    # ---------------------------------------------------------
    # Cache policy
    # ---------------------------------------------------------
    # HTML and the service worker are NEVER long-cached — they
    # carry the version pin that fans out to the cached shell.
    @nocache {
        path /index.html / /sw.js /manifest.webmanifest
    }
    header @nocache Cache-Control "no-cache, no-store, must-revalidate"

    # Hashed/versioned static assets get a long cache
    # (We don't hash filenames yet — when v5 adds a build step,
    # tighten this to immutable on hashed paths.)
    @static {
        path *.css *.js *.svg *.png *.woff2 *.webp
    }
    header @static Cache-Control "public, max-age=3600"

    # ---------------------------------------------------------
    # Block dotfiles — but NEVER blanket-block /.* (catches /.well-known/)
    # ---------------------------------------------------------
    @dotfiles path /.env* /.git* /.DS_Store /.htaccess /.htpasswd
    respond @dotfiles 404

    # ---------------------------------------------------------
    # Logging — defaults to journald via systemd, consistent with
    # the other tenants. Per-tenant log files would need the caddy
    # user to have write access to /var/log/caddy/ which it does
    # not have by default; revisit if log isolation becomes useful.
    # View logs via:  sudo journalctl -u caddy | grep letters
    # ---------------------------------------------------------
}
